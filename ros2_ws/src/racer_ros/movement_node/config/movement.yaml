# Wall Follow + Reactive Gap Combined Parameters

trajectory:
  ros__parameters:
    # Wall Follow PID Controller ------------
    # NOTE: Kp rescaled for 12deg servo range. Old Kp=0.83 saturated at 0.25m error.
    # With STEER_MAX=0.209 rad and typical max error ~1.0m: Kp_max = 0.209/1.0 = 0.21
    # Start conservative. Tune Kp up until oscillation, then back off 30%.
    # Keep Ki=0 until P+D is stable — Ki was causing integral windup oscillation.
    kp: 0.15
    ki: 0.0
    kd: 0.05

    desired_distance: 1.2        # (meters)   from the right wall
    lookahead_distance: 2.0      # (meters)   lookahead
    theta_deg: 35.0              # (degrees)  angle between two LiDAR beams
    max_speed: 2.5               # (m/s)      wall-follow max speed

    # Follow the Gap configs --------------------
    bubble_radius: 0.6           # (meters)   safety bubble
    preprocess_conv_size: 3      #            window for lidar
    max_lidar_range: 5.5         # (meters)   cliped lidar
    speed_min: 0.5               # (m/s)      min speed
    speed_max: 2.5               # (m/s)      max speed


    steering_gain: 1.0           #            reactive steering gain
    disparity_threshold: 0.5     # (meters)   disparity extender and how far to jump

    # blending node ------------
    # danger_threshold: closest obstacle distance that starts activating reactive mode
    # blend_range: width of the smooth transition zone — MUST be < danger_threshold
    #   - > danger_threshold                  ->  wall_follow
    #   - < (danger_threshold - blend_range)  ->  follow the gap  (full reactive)
    #   - between                             ->  blend of both
    # BUG FIX: old blend_range=1.25 > danger_threshold=0.6 so reactive never hit 100%
    danger_threshold: 1.0        # (meters)
    blend_range: 0.4             # (meters)  — lower = 1.0-0.4 = 0.6m triggers full reactive

    min_wall_range: 0.15
    max_wall_range: 4.75
    wall_blend_alpha: 0.25
