# Wall Follow + Reactive Gap Combined Parameters

trajectory:
  ros__parameters:
    # Wall Follow PID Controller ------------
    # Ziegler-Nichols tuning — STEER_MAX=8deg, STEER_MIN=-7deg
    # Increase kp by 0.01 each run until oscillation → that is Ku
    # Then: kp = 0.6*Ku, ki = 1.2*Ku/Tu, kd = 0.075*Ku*Tu
    kp: 0.07
    ki: 0.0
    kd: 0.0065

    desired_distance: 0.9         # (meters)   fallback when only one wall visible
    lookahead_distance: 1.5       # (meters)   lookahead
    theta_deg: 45.0               # (degrees)  angle between two LiDAR beams
    max_speed: 0.8                # (m/s)      raise in 0.2 steps after PID is stable

    # Follow the Gap configs --------------------
    bubble_radius: 0.4            # (meters)   safety bubble around closest obstacle
    preprocess_conv_size: 3       #            smoothing window
    max_lidar_range: 5.5          # (meters)   clip range
    speed_min: 0.3                # (m/s)      min reactive speed
    speed_max: 0.8                # (m/s)      max reactive speed — keep equal to max_speed

    steering_gain: 1.0            #            reactive steering scale
    disparity_threshold: 0.5      # (meters)   disparity extender jump threshold

    # Blending: reactive activates when a FRONTAL obstacle (±60°) is within danger_threshold
    #   > danger_threshold               → pure wall_follow
    #   < (danger_threshold-blend_range) → pure reactive (follow the gap)
    #   between                          → smooth blend
    # Side walls at 90° are excluded from closest calc so they don't trigger reactive.
    danger_threshold: 0.6         # (meters) — frontal obstacle distance to start reacting
    blend_range: 0.2              # (meters) — full reactive at (0.6 - 0.2) = 0.4m

    min_wall_range: 0.15
    max_wall_range: 4.75
    wall_blend_alpha: 1.0         # 1.0 = pure corridor centering (equidistant from both walls)
                                  # 0.0 = pure right-wall tracking at desired_distance
